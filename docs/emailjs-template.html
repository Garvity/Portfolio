<!--
  EmailJS template for the portfolio contact form.
  Paste this into: EmailJS Dashboard → Email Templates → New Template → "Code" editor (Content tab).

  Template variables (must match the form input names in src/sections/Contact.jsx):
    {{name}}     — sender's name
    {{email}}    — sender's email
    {{subject}}  — subject line
    {{message}}  — message body

  Recommended template SETTINGS (right panel in the EmailJS editor):
    To Email:  garvity375@gmail.com
    From Name: Garvity Portfolio
    Subject:   ⚡ Portfolio Contact — {{subject}}
    Reply To:  {{email}}     ← lets you hit "Reply" in Gmail and answer the sender directly
-->
<div style="margin:0;padding:0;background-color:#05060f;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#05060f;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;background-color:#0a0d1f;border:1px solid #1e293b;border-radius:16px;overflow:hidden;">

          <!-- Header bar -->
          <tr>
            <td style="background:linear-gradient(90deg,#38bdf8,#a78bfa);height:4px;font-size:0;line-height:0;">&nbsp;</td>
          </tr>

          <!-- Terminal-style title -->
          <tr>
            <td style="padding:28px 32px 8px 32px;font-family:'Courier New',monospace;">
              <p style="margin:0;color:#22d3ee;font-size:13px;letter-spacing:2px;">
                garv@portfolio:~$ <span style="color:#94a3b8;">new_message_received</span>
              </p>
              <h1 style="margin:12px 0 0 0;color:#f8fafc;font-family:Arial,Helvetica,sans-serif;font-size:22px;font-weight:bold;">
                📬 New message from <span style="color:#38bdf8;">{{name}}</span>
              </h1>
            </td>
          </tr>

          <!-- Meta info card -->
          <tr>
            <td style="padding:20px 32px 0 32px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#0f172a;border:1px solid #1e293b;border-radius:12px;">
                <tr>
                  <td style="padding:16px 20px;font-family:Arial,Helvetica,sans-serif;">
                    <p style="margin:0 0 8px 0;font-size:13px;color:#64748b;">
                      <strong style="color:#94a3b8;">From:</strong>
                      <span style="color:#e2e8f0;">{{name}}</span>
                    </p>
                    <p style="margin:0 0 8px 0;font-size:13px;color:#64748b;">
                      <strong style="color:#94a3b8;">Email:</strong>
                      <a href="mailto:{{email}}" style="color:#38bdf8;text-decoration:none;">{{email}}</a>
                    </p>
                    <p style="margin:0;font-size:13px;color:#64748b;">
                      <strong style="color:#94a3b8;">Subject:</strong>
                      <span style="color:#e2e8f0;">{{subject}}</span>
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Message body -->
          <tr>
            <td style="padding:20px 32px 0 32px;">
              <p style="margin:0 0 8px 0;font-family:'Courier New',monospace;font-size:12px;color:#22d3ee;letter-spacing:1px;">
                &gt; MESSAGE
              </p>
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#0f172a;border-left:3px solid #a78bfa;border-radius:0 12px 12px 0;">
                <tr>
                  <td style="padding:18px 20px;font-family:Arial,Helvetica,sans-serif;">
                    <p style="margin:0;color:#e2e8f0;font-size:15px;line-height:1.7;white-space:pre-wrap;">{{message}}</p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Reply button -->
          <tr>
            <td style="padding:28px 32px;" align="center">
              <a href="mailto:{{email}}?subject=Re:%20{{subject}}"
                 style="display:inline-block;background:linear-gradient(90deg,#38bdf8,#a78bfa);color:#05060f;font-family:Arial,Helvetica,sans-serif;font-size:14px;font-weight:bold;text-decoration:none;padding:12px 32px;border-radius:999px;">
                ↩ Reply to {{name}}
              </a>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:0 32px 24px 32px;border-top:1px solid #1e293b;" align="center">
              <p style="margin:16px 0 0 0;font-family:'Courier New',monospace;font-size:11px;color:#475569;">
                2026@garv — sent via the contact form at your portfolio
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</div>
